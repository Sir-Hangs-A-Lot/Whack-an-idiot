<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beat him up !!!</title>

  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet" />

  <style>
    :root, [data-theme="light"] {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);

      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;

      --color-bg: #f7f6f2;
      --color-surface: #fbfbf9;
      --color-surface-2: #f1eee8;
      --color-border: #d9d2c7;
      --color-text: #25211c;
      --color-text-inverse: #f9f8f4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;

      --shadow-sm: 0 1px 2px rgba(28, 24, 20, 0.08);
      --shadow-md: 0 12px 26px rgba(28, 24, 20, 0.14);
      --shadow-lg: 0 20px 50px rgba(28, 24, 20, 0.18);

      --radius-xl: 1.5rem;
      --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);

      --font-body: "Satoshi", "Inter", sans-serif;
      --font-display: "Cabinet Grotesk", "Inter", sans-serif;
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1d1b19;
      --color-surface-2: #252320;
      --color-border: #3a3631;
      --color-text: #ece7df;
      --color-text-inverse: #1a1816;
      --color-primary: #54a5ab;
      --color-primary-hover: #7bc4ca;

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
      --shadow-md: 0 12px 26px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: var(--space-4);
      overflow: hidden;
      cursor: none;
      font-family: var(--font-body);
      color: var(--color-text);
      background:
        radial-gradient(circle at top left, rgba(1, 105, 111, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(156, 41, 81, 0.10), transparent 24%),
        var(--color-bg);
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    button {
      border: 0;
      font: inherit;
      cursor: none;
    }

    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: 0.5rem;
    }

    .game-shell {
      width: min(100%, 920px);
      display: grid;
      gap: var(--space-4);
      justify-items: center;
      position: relative;
    }

    .top-controls {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      pointer-events: none;
    }

    .start-btn,
    .theme-toggle {
      pointer-events: auto;
      min-height: 46px;
      padding: 0.85rem 1.15rem;
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition), background var(--transition);
    }

    .start-btn {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .start-btn:hover,
    .start-btn:focus-visible {
      background: var(--color-primary-hover);
    }

    .theme-toggle {
      width: 46px;
      padding: 0;
      display: grid;
      place-items: center;
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    .board-wrap {
      width: 100%;
      position: relative;
      display: grid;
      justify-items: center;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(130px, 180px));
      gap: var(--space-4);
      justify-content: center;
    }

    .hole {
      position: relative;
      min-height: 142px;
      aspect-ratio: 1 / 1.02;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--color-text) 10%, var(--color-border));
      border-radius: 1.6rem;
      background:
        linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-primary) 8%, var(--color-surface-2)) 0%,
          color-mix(in srgb, #8d5a2b 22%, var(--color-surface-2)) 100%
        );
      box-shadow: inset 0 -14px 18px rgba(0, 0, 0, 0.12), var(--shadow-md);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .hole:hover {
      transform: translateY(-2px);
    }

    .hole:active {
      transform: translateY(1px) scale(0.99);
    }

    .hole::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: 6px;
      height: 26%;
      z-index: 2;
      pointer-events: none;
      border-radius: 50%;
      background:
        radial-gradient(
          circle at center,
          rgba(31, 22, 16, 0.95) 0%,
          rgba(50, 34, 24, 0.92) 58%,
          rgba(89, 63, 42, 0.88) 100%
        );
    }

    .mole-wrap {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 62%;
      height: 68%;
      z-index: 1;
      pointer-events: none;
      transform: translate(-50%, 68%);
      transition: transform 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hole.up .mole-wrap {
      transform: translate(-50%, -22%);
    }

    .hole.hit .mole-wrap {
      transform: translate(-50%, -22%) scale(1.05);
    }

    .mole-figure {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 1.25rem 1.25rem 0.95rem 0.95rem;
      background: linear-gradient(180deg, #d6b08a 0%, #8c6240 100%);
      box-shadow: var(--shadow-sm);
    }

    .mole-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mole-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: #fffaf3;
      font-weight: 800;
      background: linear-gradient(180deg, #bb8253, #7e5336);
    }

    .hammer {
      position: fixed;
      left: 0;
      top: 0;
      width: 96px;
      height: 96px;
      z-index: 50;
      pointer-events: none;
      transform: translate3d(-120px, -120px, 0);
      transform-origin: 68% 24%;
      transition: transform 45ms linear;
      filter: drop-shadow(0 10px 16px rgba(0, 0, 0, 0.24));
    }

    .hammer.swing {
      transform: translate3d(var(--hx), var(--hy), 0) rotate(28deg) scale(0.98);
    }

    .hammer-body {
      width: 100%;
      height: 100%;
    }

    .hammer-user {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 1.2rem;
      background: var(--color-surface);
    }

    .hammer-user img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hammer-default {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .hammer-default::before,
    .hammer-default::after {
      content: "";
      position: absolute;
      border-radius: 999px;
    }

    .hammer-default::before {
      left: 32px;
      top: 8px;
      width: 24px;
      height: 68px;
      transform: rotate(28deg);
      background: linear-gradient(180deg, #b3773c, #805029);
    }

    .hammer-default::after {
      left: 14px;
      top: 4px;
      width: 48px;
      height: 24px;
      border-radius: 0.85rem;
      background: linear-gradient(180deg, #c7d0d8, #7b8893);
      box-shadow: inset 0 -4px 5px rgba(0, 0, 0, 0.18);
    }

    .result-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: var(--space-5);
      border-radius: var(--radius-xl);
      opacity: 0;
      pointer-events: none;
      background: rgba(13, 11, 9, 0.6);
      transition: opacity 220ms ease;
    }

    .result-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .result-card {
      width: min(100%, 360px);
      display: grid;
      gap: var(--space-4);
      justify-items: center;
      padding: var(--space-6);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius-xl);
      background: rgba(22, 18, 15, 0.88);
      color: white;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }

    .result-card h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--text-xl);
    }

    .result-card p {
      margin: 0;
      font-size: var(--text-base);
      color: rgba(255, 255, 255, 0.86);
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
        cursor: auto;
      }

      button {
        cursor: pointer;
      }

      .board-grid {
        grid-template-columns: repeat(3, minmax(88px, 1fr));
        gap: var(--space-3);
      }

      .hole {
        min-height: 108px;
      }

      .hammer {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="hammer" id="hammer" aria-hidden="true">
    <div class="hammer-body" id="hammerBody"></div>
  </div>

  <main class="game-shell" id="gameShell">
    <div class="top-controls">
      <button class="start-btn" id="startBtn" type="button">Start</button>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme"></button>
    </div>

    <section class="board-wrap" aria-label="Whack a mole board">
      <div class="board-grid" id="board"></div>

      <div class="result-overlay show" id="resultOverlay" aria-live="polite">
        <div class="result-card">
          <h2 id="overlayTitle">Ready?</h2>
          <p id="overlayText">Hit the mole at least 5 times in 10 tries.</p>
          <button class="start-btn" id="overlayButton" type="button">Play</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const ASSETS = {
      mole: "./assets/mole.png",
      hit: "./assets/mole-hit.png",
      hammer: "./assets/hammer.png"
    };

    const board = document.getElementById("board");
    const startBtn = document.getElementById("startBtn");
    const overlayButton = document.getElementById("overlayButton");
    const resultOverlay = document.getElementById("resultOverlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const hammer = document.getElementById("hammer");
    const hammerBody = document.getElementById("hammerBody");
    const themeToggle = document.querySelector("[data-theme-toggle]");
    const gameShell = document.getElementById("gameShell");

    const state = {
      tries: 0,
      hits: 0,
      misses: 0,
      maxTries: 10,
      targetHits: 5,
      running: false,
      activeHole: null,
      popTimer: null,
      nextTimer: null,
      theme: window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light"
    };

    document.documentElement.setAttribute("data-theme", state.theme);
    updateThemeIcon();

    function createHole(index) {
      const button = document.createElement("button");

      button.type = "button";
      button.className = "hole";
      button.setAttribute("aria-label", `Hole ${index + 1}`);
      button.dataset.index = String(index);

      button.innerHTML = `
        <span class="mole-wrap" aria-hidden="true">
          <span class="mole-figure">
            <img
              class="mole-image"
              src="${ASSETS.mole}"
              alt="Mole"
              onerror="this.replaceWith(Object.assign(document.createElement('span'), { className: 'mole-fallback', textContent: 'MOLE' }))"
            >
          </span>
        </span>
      `;

      button.addEventListener("click", () => handleHoleClick(button));

      return button;
    }

    const holes = Array.from({ length: 9 }, (_, index) => createHole(index));
    holes.forEach((hole) => board.appendChild(hole));

    hammerBody.innerHTML = `
      <div class="hammer-user">
        <img
          src="${ASSETS.hammer}"
          alt="Hammer image"
          onerror="this.parentElement.replaceWith(Object.assign(document.createElement('div'), { className: 'hammer-default' }))"
        >
      </div>
    `;

    function clearTimers() {
      clearTimeout(state.popTimer);
      clearTimeout(state.nextTimer);
    }

    function getMoleImage(hole) {
      return hole.querySelector(".mole-image");
    }

    function setNormalMole(hole) {
      const moleImage = getMoleImage(hole);

      if (moleImage) {
        moleImage.src = ASSETS.mole;
        moleImage.alt = "Mole";
      }
    }

    function setHitMole(hole) {
      const moleImage = getMoleImage(hole);

      if (moleImage) {
        moleImage.src = ASSETS.hit;
        moleImage.alt = "Hit mole";
      }
    }

    function hideAllMoles() {
      holes.forEach((hole) => {
        hole.classList.remove("up", "hit");
        setNormalMole(hole);
      });

      state.activeHole = null;
    }

    function randomHole() {
      const available = holes.filter((hole) => hole !== state.activeHole);
      return available[Math.floor(Math.random() * available.length)];
    }

    function scheduleNextPop(delay = 320) {
      clearTimeout(state.nextTimer);

      if (!state.running) return;

      state.nextTimer = setTimeout(popMole, delay);
    }

    function popMole() {
      hideAllMoles();

      if (!state.running) return;

      const hole = randomHole();

      /* Ensure every new pop starts with normal mole.png. */
      setNormalMole(hole);

      state.activeHole = hole;
      hole.classList.add("up");

      state.popTimer = setTimeout(() => {
        if (state.activeHole !== hole) return;

        /* Missed mole goes down using the regular mole image. */
        hole.classList.remove("up");
        state.activeHole = null;

        setTimeout(() => {
          setNormalMole(hole);

          if (state.running) {
            scheduleNextPop(220 + Math.random() * 320);
          }
        }, 200);
      }, 680 + Math.random() * 320);
    }

    function beginRound() {
      clearTimers();
      hideAllMoles();

      state.tries = 0;
      state.hits = 0;
      state.misses = 0;
      state.running = true;

      gameShell.classList.remove("show-score");
      resultOverlay.classList.remove("show");

      scheduleNextPop(350);
    }

    function finishRound() {
      clearTimers();
      hideAllMoles();

      state.running = false;

      const won = state.hits >= state.targetHits;

      gameShell.classList.add("show-score");
      overlayTitle.textContent = won ? "Sorry" : "Try again";
      overlayText.textContent = won
        ? ""
        : `You got ${state.hits} hits. You need 5 out of 10.`;

      overlayButton.textContent = "Play again";
      resultOverlay.classList.add("show");
    }

    function registerMiss() {
      state.tries += 1;
      state.misses += 1;

      if (state.tries >= state.maxTries) {
        finishRound();
      }
    }

    function handleHoleClick(hole) {
      if (!state.running) return;

      const isActive =
        hole === state.activeHole &&
        hole.classList.contains("up");

      if (!isActive) {
        registerMiss();
        return;
      }

      clearTimers();
      state.activeHole = null;

      /*
        Immediately replace normal mole image with mole-hit image.
        This remains visible briefly above the hole.
      */
      setHitMole(hole);
      hole.classList.add("hit");

      state.tries += 1;
      state.hits += 1;

      /*
        After 180ms, remove "up".
        The same hit-image then lowers with .mole-wrap.
      */
      setTimeout(() => {
        hole.classList.remove("up", "hit");
      }, 180);

      /*
        Once the 200ms lowering transition finishes:
        restore normal mole.png, then continue or finish.
      */
      setTimeout(() => {
        setNormalMole(hole);

        const won = state.hits >= state.targetHits;
        const outOfTries = state.tries >= state.maxTries;

        if (won || outOfTries) {
          finishRound();
          return;
        }

        if (state.running) {
          scheduleNextPop(180 + Math.random() * 220);
        }
      }, 420);
    }

    startBtn.addEventListener("click", beginRound);
    overlayButton.addEventListener("click", beginRound);

    document.addEventListener("pointermove", (event) => {
      const x = event.clientX - 18;
      const y = event.clientY - 18;

      hammer.style.setProperty("--hx", `${x}px`);
      hammer.style.setProperty("--hy", `${y}px`);

      if (!hammer.classList.contains("swing")) {
        hammer.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      }
    });

    document.addEventListener("pointerdown", () => {
      hammer.classList.add("swing");

      setTimeout(() => {
        hammer.classList.remove("swing");
      }, 110);
    });

    function updateThemeIcon() {
      themeToggle.innerHTML = state.theme === "dark"
        ? `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
        `
        : `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        `;
    }

    themeToggle.addEventListener("click", () => {
      state.theme = state.theme === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", state.theme);
      updateThemeIcon();
    });
  </script>
</body>
</html>
